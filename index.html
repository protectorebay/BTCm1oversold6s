<script>

const SYMBOL = "BTCUSDT";
const INTERVAL = "1m";

async function loadRSI() {
    try {

        const url = `https://api.binance.com/api/v3/klines?symbol=${SYMBOL}&interval=${INTERVAL}&limit=200&nocache=${Date.now()}`;

        const response = await fetch(url, { cache: "no-store" });
        const data = await response.json();

        if (!Array.isArray(data)) throw "API error";

        const closes = data.map(c => parseFloat(c[4]));
        const rsi = calculateRSI(closes, 14);

        updateUI(rsi[rsi.length - 1]);

    } catch (e) {
        console.log(e);
        document.getElementById("value").innerText = "--";
    }
}

function calculateRSI(prices, period) {

    let gains = 0;
    let losses = 0;

    for (let i = 1; i <= period; i++) {
        let diff = prices[i] - prices[i - 1];

        if (diff >= 0) gains += diff;
        else losses -= diff;
    }

    gains /= period;
    losses /= period;

    let rs = gains / (losses || 1);

    let rsi = [100 - (100 / (1 + rs))];

    for (let i = period + 1; i < prices.length; i++) {

        let diff = prices[i] - prices[i - 1];

        let gain = diff > 0 ? diff : 0;
        let loss = diff < 0 ? -diff : 0;

        gains = (gains * (period - 1) + gain) / period;
        losses = (losses * (period - 1) + loss) / period;

        rs = gains / (losses || 1);

        rsi.push(100 - (100 / (1 + rs)));
    }

    return rsi;
}

function updateUI(value) {

    const meter = document.getElementById("meter");
    const needle = document.getElementById("needle");
    const valueEl = document.getElementById("value");

    if (!value || isNaN(value)) return;

    valueEl.innerText = value.toFixed(2);

    const width = meter.offsetWidth;
    const position = (value / 100) * width;

    needle.style.left = (position - 10) + "px";

    if (value > 70) valueEl.style.color = "#e53935";
    else if (value < 30) valueEl.style.color = "#00c853";
    else valueEl.style.color = "black";
}

async function loop() {

    while (true) {
        await loadRSI();
        await new Promise(r => setTimeout(r, 6000));
    }

}

loop();

</script>
